name: Generate Protocol CSharp

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1) 레포 체크아웃 (서브모듈 포함)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) protoc 설치
      - name: Install protoc
        uses: arduino/setup-protoc@v2
        with:
          version: "25.3"

      # 3) proto -> C# 생성
      - name: Generate C# from proto
        run: |
          mkdir -p Generated/Protocol
          protoc \
            --proto_path=External/proto \
            --csharp_out=Generated/Protocol \
            External/proto/*.proto

      # 4) Unity Assets 경로로 복사
      - name: Move generated files to Unity Assets
        run: |
          mkdir -p Assets/_Scripts/Network/Protocol
          cp Generated/Protocol/*.cs Assets/_Scripts/Network/Protocol/
